syntax = "proto3";

package skylex.v1;

import "skylex/v1/common.proto";

service ClusterService {
  rpc CreateCluster(CreateClusterRequest) returns (CreateClusterResponse);
  rpc GetCluster(GetClusterRequest) returns (GetClusterResponse);
  rpc ListClusters(ListClustersRequest) returns (ListClustersResponse);
  rpc UpdateCluster(UpdateClusterRequest) returns (UpdateClusterResponse);
  rpc DeleteCluster(DeleteClusterRequest) returns (DeleteClusterResponse);
  rpc FailoverCluster(FailoverClusterRequest) returns (FailoverClusterResponse);
  rpc RestartNode(RestartNodeRequest) returns (RestartNodeResponse);
  rpc ScaleCluster(ScaleClusterRequest) returns (ScaleClusterResponse);
  rpc GetClusterSettings(GetClusterSettingsRequest) returns (GetClusterSettingsResponse);
  rpc UpdateClusterSettings(UpdateClusterSettingsRequest) returns (UpdateClusterSettingsResponse);
}

message CreateClusterRequest {
  string name = 1;
  ClusterConfig config = 2;
  repeated string node_ids = 3;
}

message CreateClusterResponse {
  Cluster cluster = 1;
}

message GetClusterRequest {
  string id = 1;
}

message GetClusterResponse {
  Cluster cluster = 1;
}

message ListClustersRequest {
  int32 page = 1;
  int32 page_size = 2;
}

message ListClustersResponse {
  repeated Cluster clusters = 1;
  Pagination pagination = 2;
}

message UpdateClusterRequest {
  string id = 1;
  ClusterConfig config = 2;
}

message UpdateClusterResponse {
  Cluster cluster = 1;
}

message DeleteClusterRequest {
  string id = 1;
}

message DeleteClusterResponse {}

message FailoverClusterRequest {
  string cluster_id = 1;
}

message FailoverClusterResponse {
  Cluster cluster = 1;
}

message RestartNodeRequest {
  string node_id = 1;
}

message RestartNodeResponse {
  Node node = 1;
}

message ScaleClusterRequest {
  string cluster_id = 1;
  int32 replica_count = 2;
}

message ScaleClusterResponse {
  Cluster cluster = 1;
}

service NodeService {
  rpc ListNodes(ListNodesRequest) returns (ListNodesResponse);
  rpc GetNode(GetNodeRequest) returns (GetNodeResponse);
  rpc DrainNode(DrainNodeRequest) returns (DrainNodeResponse);
  rpc RejoinNode(RejoinNodeRequest) returns (RejoinNodeResponse);
  rpc DeleteNode(DeleteNodeRequest) returns (DeleteNodeResponse);
  rpc ResolveInstallationConflict(ResolveInstallationConflictRequest) returns (ResolveInstallationConflictResponse);
  rpc ListNodeCommandLogs(ListNodeCommandLogsRequest) returns (ListNodeCommandLogsResponse);
}

message ListNodesRequest {
  string cluster_id = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message ListNodesResponse {
  repeated Node nodes = 1;
  Pagination pagination = 2;
}

message GetNodeRequest {
  string id = 1;
}

message GetNodeResponse {
  Node node = 1;
}

message DrainNodeRequest {
  string node_id = 1;
}

message DrainNodeResponse {
  Node node = 1;
}

message RejoinNodeRequest {
  string node_id = 1;
}

message RejoinNodeResponse {
  Node node = 1;
}

message DeleteNodeRequest {
  string node_id = 1;
}

message DeleteNodeResponse {}

enum ResolveInstallationConflictAction {
  RESOLVE_INSTALLATION_CONFLICT_ACTION_UNSPECIFIED = 0;
  RESOLVE_INSTALLATION_CONFLICT_ACTION_ADOPT = 1;
  RESOLVE_INSTALLATION_CONFLICT_ACTION_PURGE = 2;
  RESOLVE_INSTALLATION_CONFLICT_ACTION_ABORT = 3;
}

message ResolveInstallationConflictRequest {
  string node_id = 1;
  ResolveInstallationConflictAction action = 2;
}

message ResolveInstallationConflictResponse {
  Node node = 1;
}

message ListNodeCommandLogsRequest {
  string cluster_id = 1;
  string node_id = 2;
  string command_id = 3;
  int32 page = 4;
  int32 page_size = 5;
}

message CommandLog {
  string id = 1;
  string command_id = 2;
  string node_id = 3;
  string hostname = 4;
  string level = 5;
  string message = 6;
  int64 timestamp_ms = 7;
}

message ListNodeCommandLogsResponse {
  repeated CommandLog logs = 1;
  Pagination pagination = 2;
}

message ClusterSettings {
  map<string, string> parameters = 1;
}

message GetClusterSettingsRequest {
  string cluster_id = 1;
}

message GetClusterSettingsResponse {
  ClusterSettings settings = 1;
}

message UpdateClusterSettingsRequest {
  string cluster_id = 1;
  ClusterSettings settings = 2;
}

message UpdateClusterSettingsResponse {
  Cluster cluster = 1;
}
