syntax = "proto3";

package skylex.v1;

import "skylex/v1/common.proto";
import "google/protobuf/timestamp.proto";

service ClusterService {
  rpc CreateCluster(CreateClusterRequest) returns (CreateClusterResponse);
  rpc GetCluster(GetClusterRequest) returns (GetClusterResponse);
  rpc GetClusterHealth(GetClusterHealthRequest) returns (GetClusterHealthResponse);
  rpc ListClusters(ListClustersRequest) returns (ListClustersResponse);
  rpc UpdateCluster(UpdateClusterRequest) returns (UpdateClusterResponse);
  rpc DeleteCluster(DeleteClusterRequest) returns (DeleteClusterResponse);
  rpc StartCluster(StartClusterRequest) returns (StartClusterResponse);
  rpc PauseCluster(PauseClusterRequest) returns (PauseClusterResponse);
  rpc RestartCluster(RestartClusterRequest) returns (RestartClusterResponse);
  rpc FailoverCluster(FailoverClusterRequest) returns (FailoverClusterResponse);
  rpc RestartNode(RestartNodeRequest) returns (RestartNodeResponse);
  rpc ScaleCluster(ScaleClusterRequest) returns (ScaleClusterResponse);
  rpc GetClusterSettings(GetClusterSettingsRequest) returns (GetClusterSettingsResponse);
  rpc UpdateClusterSettings(UpdateClusterSettingsRequest) returns (UpdateClusterSettingsResponse);
}

message CreateClusterRequest {
  string name = 1;
  ClusterConfig config = 2;
  repeated string node_ids = 3;
}

message CreateClusterResponse {
  Cluster cluster = 1;
}

message GetClusterRequest {
  string id = 1;
}

message GetClusterResponse {
  Cluster cluster = 1;
  // modules is the ordered set of management capabilities the cluster's engine
  // exposes. The UI builds its detail sidebar directly from this list so it
  // needs no engine-specific branching (e.g. "extensions" is present for
  // PostgreSQL but absent for MariaDB/MySQL).
  repeated EngineModule modules = 2;
}

// EngineModule is a single UI-visible management capability advertised by a
// database engine provider.
message EngineModule {
  string id = 1;     // "overview" | "connection" | "databases" | "roles" | "network" | "tls" | "extensions" | "settings" | "diagnostics"
  string label = 2;  // human-readable label, e.g. "Databases"
}

message GetClusterHealthRequest {
  string id = 1;
}

// NodeHealth is a compact, poll-friendly snapshot of a single node's
// provisioning/runtime status. It intentionally excludes log lines and
// raw metrics (those have dedicated endpoints).
message NodeHealth {
  string node_id = 1;
  string hostname = 2;
  NodeRole role = 3;
  // status is the coarse node status (online/offline/...).
  string status = 4;
  // status_detail is the human-readable detail (healthy, syncing_replica, ...).
  string status_detail = 5;
  InstallationState installation_state = 6;
  bool postgres_installed = 7;
  bool postgres_data_initialized = 8;
  bool agent_connected = 9;
  // ready is true when the node has PostgreSQL installed, data initialized and
  // an installed/adopted installation state (i.e. provisioning finished).
  bool ready = 10;
  string conflict_details = 11;
}

// ClusterActionProgress summarizes the in-flight action (creation/lifecycle)
// derived from queued agent commands. It reports step counts, not log content.
message ClusterActionProgress {
  // operation is "create" while the cluster is provisioning, "lifecycle" for
  // start/stop/restart work, or "" when nothing is in flight.
  string operation = 1;
  int32 total_steps = 2;
  int32 completed_steps = 3;
  int32 failed_steps = 4;
  int32 pending_steps = 5;
  // percent is completed_steps/total_steps * 100 (0 when total_steps == 0).
  int32 percent = 6;
  bool in_progress = 7;
}

message GetClusterHealthResponse {
  string cluster_id = 1;
  ClusterStatus status = 2;
  repeated NodeHealth nodes = 3;
  ClusterActionProgress progress = 4;
  int32 ready_nodes = 5;
  int32 total_nodes = 6;
}

message ListClustersRequest {
  int32 page = 1;
  int32 page_size = 2;
}

message ListClustersResponse {
  repeated Cluster clusters = 1;
  Pagination pagination = 2;
}

message UpdateClusterRequest {
  string id = 1;
  ClusterConfig config = 2;
}

message UpdateClusterResponse {
  Cluster cluster = 1;
}

message DeleteClusterRequest {
  string id = 1;
}

message DeleteClusterResponse {}

message StartClusterRequest {
  string cluster_id = 1;
}

message StartClusterResponse {
  Cluster cluster = 1;
}

message PauseClusterRequest {
  string cluster_id = 1;
}

message PauseClusterResponse {
  Cluster cluster = 1;
}

message RestartClusterRequest {
  string cluster_id = 1;
}

message RestartClusterResponse {
  Cluster cluster = 1;
}

message FailoverClusterRequest {
  string cluster_id = 1;
}

message FailoverClusterResponse {
  Cluster cluster = 1;
}

message RestartNodeRequest {
  string node_id = 1;
}

message RestartNodeResponse {
  Node node = 1;
}

message ScaleClusterRequest {
  string cluster_id = 1;
  int32 replica_count = 2;
}

message ScaleClusterResponse {
  Cluster cluster = 1;
}

service NodeService {
  rpc ListNodes(ListNodesRequest) returns (ListNodesResponse);
  rpc GetNode(GetNodeRequest) returns (GetNodeResponse);
  rpc ListNodeMetrics(ListNodeMetricsRequest) returns (ListNodeMetricsResponse);
  rpc DrainNode(DrainNodeRequest) returns (DrainNodeResponse);
  rpc RejoinNode(RejoinNodeRequest) returns (RejoinNodeResponse);
  rpc DeleteNode(DeleteNodeRequest) returns (DeleteNodeResponse);
  rpc ResolveInstallationConflict(ResolveInstallationConflictRequest) returns (ResolveInstallationConflictResponse);
  rpc ListNodeCommandLogs(ListNodeCommandLogsRequest) returns (ListNodeCommandLogsResponse);
}

message ListNodesRequest {
  string cluster_id = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message ListNodesResponse {
  repeated Node nodes = 1;
  Pagination pagination = 2;
}

message GetNodeRequest {
  string id = 1;
}

message GetNodeResponse {
  Node node = 1;
}

message ListNodeMetricsRequest {
  string node_id = 1;
  google.protobuf.Timestamp since = 2;
  int32 limit = 3;
}

message ListNodeMetricsResponse {
  repeated NodeMetric metrics = 1;
}

message DrainNodeRequest {
  string node_id = 1;
}

message DrainNodeResponse {
  Node node = 1;
}

message RejoinNodeRequest {
  string node_id = 1;
}

message RejoinNodeResponse {
  Node node = 1;
}

message DeleteNodeRequest {
  string node_id = 1;
}

message DeleteNodeResponse {}

enum ResolveInstallationConflictAction {
  RESOLVE_INSTALLATION_CONFLICT_ACTION_UNSPECIFIED = 0;
  RESOLVE_INSTALLATION_CONFLICT_ACTION_ADOPT = 1;
  RESOLVE_INSTALLATION_CONFLICT_ACTION_PURGE = 2;
  RESOLVE_INSTALLATION_CONFLICT_ACTION_ABORT = 3;
}

message ResolveInstallationConflictRequest {
  string node_id = 1;
  ResolveInstallationConflictAction action = 2;
  // postgres_admin_user is the existing PostgreSQL administrative role used
  // only when adopting a native installation.
  string postgres_admin_user = 3;
  // postgres_admin_password is sent as a command secret for native adoption.
  string postgres_admin_password = 4;
}

message ResolveInstallationConflictResponse {
  Node node = 1;
}

message ListNodeCommandLogsRequest {
  string cluster_id = 1;
  string node_id = 2;
  string command_id = 3;
  int32 page = 4;
  int32 page_size = 5;
  // level filters by exact log level (info|warn|error|debug). Empty = all levels.
  string level = 6;
  // since_ms / until_ms bound created_at (unix millis, UTC). 0 = unbounded.
  int64 since_ms = 7;
  int64 until_ms = 8;
}

message CommandLog {
  string id = 1;
  string command_id = 2;
  string node_id = 3;
  string hostname = 4;
  string level = 5;
  string message = 6;
  int64 timestamp_ms = 7;
}

message ListNodeCommandLogsResponse {
  repeated CommandLog logs = 1;
  Pagination pagination = 2;
}

message ClusterSettings {
  map<string, string> parameters = 1;
}

message GetClusterSettingsRequest {
  string cluster_id = 1;
}

message GetClusterSettingsResponse {
  ClusterSettings settings = 1;
}

message UpdateClusterSettingsRequest {
  string cluster_id = 1;
  ClusterSettings settings = 2;
}

message UpdateClusterSettingsResponse {
  Cluster cluster = 1;
}
