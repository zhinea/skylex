syntax = "proto3";

package skylex.v1;

import "google/protobuf/timestamp.proto";

// PostgresManagementService manages connection profile metadata, managed roles, and managed databases for a cluster.
service PostgresManagementService {
  rpc GetConnectionProfile(GetConnectionProfileRequest) returns (GetConnectionProfileResponse);
  rpc UpdateConnectionProfile(UpdateConnectionProfileRequest) returns (UpdateConnectionProfileResponse);
  rpc GetNetworkAccess(GetNetworkAccessRequest) returns (GetNetworkAccessResponse);
  rpc UpdateNetworkAccess(UpdateNetworkAccessRequest) returns (UpdateNetworkAccessResponse);
  rpc ApplyHBA(ApplyHBARequest) returns (ApplyHBAResponse);

  // Role management RPCs (Phase 3)
  rpc ListRoles(ListRolesRequest) returns (ListRolesResponse);
  rpc CreateRole(CreateRoleRequest) returns (CreateRoleResponse);
  rpc RotateRolePassword(RotateRolePasswordRequest) returns (RotateRolePasswordResponse);
  rpc DeleteRole(DeleteRoleRequest) returns (DeleteRoleResponse);

  // Database management RPCs (Phase 4)
  rpc ListDatabases(ListDatabasesRequest) returns (ListDatabasesResponse);
  rpc CreateDatabase(CreateDatabaseRequest) returns (CreateDatabaseResponse);
  rpc DeleteDatabase(DeleteDatabaseRequest) returns (DeleteDatabaseResponse);
}

message ConnectionProfile {
  string cluster_id = 1;
  // endpoint_mode: "direct_primary" | "manual_stable_endpoint"
  string endpoint_mode = 2;
  string public_host = 3;
  int32 public_port = 4;
  // ssl_mode: "prefer" | "require" | "disable"
  string ssl_mode = 5;
  repeated string allowed_cidrs = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
  repeated string allowed_admin_cidrs = 9;
  repeated string allowed_replication_cidrs = 10;
}

message NodeEndpoint {
  string node_id = 1;
  string hostname = 2;
  string host = 3;
  int32 port = 4;
  string role = 5;
}

message GetConnectionProfileRequest {
  string cluster_id = 1;
}

message GetConnectionProfileResponse {
  ConnectionProfile profile = 1;
  // Computed primary endpoint from node data.
  NodeEndpoint primary_endpoint = 2;
  // Computed replica endpoints from node data.
  repeated NodeEndpoint replica_endpoints = 3;
  // effective_endpoint is the endpoint operators should use (may be public_host or primary node).
  string effective_host = 4;
  int32 effective_port = 5;
}

message UpdateConnectionProfileRequest {
  string cluster_id = 1;
  string endpoint_mode = 2;
  string public_host = 3;
  int32 public_port = 4;
  string ssl_mode = 5;
  repeated string allowed_cidrs = 6;
}

message UpdateConnectionProfileResponse {
  ConnectionProfile profile = 1;
}

message HBAApplyStatus {
  string cluster_id = 1;
  string node_id = 2;
  string command_id = 3;
  // status: "pending" | "running" | "succeeded" | "failed"
  string status = 4;
  string error = 5;
  google.protobuf.Timestamp applied_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message GetNetworkAccessRequest {
  string cluster_id = 1;
}

message GetNetworkAccessResponse {
  repeated string allowed_application_cidrs = 1;
  repeated string allowed_admin_cidrs = 2;
  repeated string internal_replication_cidrs = 3;
  repeated HBAApplyStatus hba_statuses = 4;
}

message UpdateNetworkAccessRequest {
  string cluster_id = 1;
  repeated string allowed_application_cidrs = 2;
  repeated string allowed_admin_cidrs = 3;
  repeated string internal_replication_cidrs = 4;
}

message UpdateNetworkAccessResponse {
  repeated string allowed_application_cidrs = 1;
  repeated string allowed_admin_cidrs = 2;
  repeated string internal_replication_cidrs = 3;
}

message ApplyHBARequest {
  string cluster_id = 1;
}

message ApplyHBAResponse {
  repeated HBAApplyStatus hba_statuses = 1;
}

// ─── Managed Roles (Phase 3) ──────────────────────────────────────────────────

message PostgresRole {
  string id = 1;
  string cluster_id = 2;
  string role_name = 3;
  // role_kind: "admin" | "read_write" | "read_only" | "custom"
  string role_kind = 4;
  int32 password_version = 5;
  google.protobuf.Timestamp expires_at = 6;
  // status: "pending" | "ready" | "failed" | "deleting"
  string status = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

message ListRolesRequest {
  string cluster_id = 1;
}

message ListRolesResponse {
  repeated PostgresRole roles = 1;
}

message CreateRoleRequest {
  string cluster_id = 1;
  string role_name = 2;
  // role_kind: "admin" | "read_write" | "read_only" | "custom"
  string role_kind = 3;
  // expires_at is optional; omit for non-expiring roles.
  google.protobuf.Timestamp expires_at = 4;
}

message CreateRoleResponse {
  PostgresRole role = 1;
  // one_time_password is shown exactly once; store it immediately.
  string one_time_password = 2;
}

message RotateRolePasswordRequest {
  string role_id = 1;
}

message RotateRolePasswordResponse {
  PostgresRole role = 1;
  // one_time_password is the new password; shown exactly once.
  string one_time_password = 2;
}

message DeleteRoleRequest {
  string role_id = 1;
}

message DeleteRoleResponse {}

// Managed Databases (Phase 4)

message PostgresDatabase {
  string id = 1;
  string cluster_id = 2;
  string database_name = 3;
  // owner_role_id is empty when ownership remains with the Skylex-managed admin/superuser role.
  string owner_role_id = 4;
  string owner_role_name = 5;
  // status: "pending" | "ready" | "failed" | "deleting"
  string status = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

message ListDatabasesRequest {
  string cluster_id = 1;
}

message ListDatabasesResponse {
  repeated PostgresDatabase databases = 1;
}

message CreateDatabaseRequest {
  string cluster_id = 1;
  string database_name = 2;
  // owner_role_id is optional. Omit to keep default Skylex admin ownership.
  string owner_role_id = 3;
}

message CreateDatabaseResponse {
  PostgresDatabase database = 1;
}

message DeleteDatabaseRequest {
  string database_id = 1;
}

message DeleteDatabaseResponse {}
