syntax = "proto3";

package skylex.v1;

import "google/protobuf/timestamp.proto";

enum ClusterStatus {
  CLUSTER_STATUS_UNSPECIFIED = 0;
  CLUSTER_STATUS_CREATING = 1;
  CLUSTER_STATUS_HEALTHY = 2;
  CLUSTER_STATUS_DEGRADED = 3;
  CLUSTER_STATUS_FAILED = 4;
  CLUSTER_STATUS_DELETING = 5;
  CLUSTER_STATUS_STOPPED = 6;
}

enum NodeRole {
  NODE_ROLE_UNSPECIFIED = 0;
  NODE_ROLE_PRIMARY = 1;
  NODE_ROLE_REPLICA = 2;
}

enum ReplicationMode {
  REPLICATION_MODE_UNSPECIFIED = 0;
  REPLICATION_MODE_ASYNC = 1;
  REPLICATION_MODE_SYNC = 2;
}

enum Engine {
  ENGINE_UNSPECIFIED = 0;
  ENGINE_POSTGRESQL = 1;
}

enum ServiceLocation {
  SERVICE_LOCATION_UNSPECIFIED = 0;
  SERVICE_LOCATION_NATIVE = 1;
  SERVICE_LOCATION_DOCKER = 2;
}

enum InstallationState {
  INSTALLATION_STATE_UNSPECIFIED = 0;
  INSTALLATION_STATE_PENDING_PREFLIGHT = 1;
  INSTALLATION_STATE_NOTHING_FOUND = 2;
  INSTALLATION_STATE_CONFLICT = 3;
  INSTALLATION_STATE_INSTALLING = 4;
  INSTALLATION_STATE_INSTALLED = 5;
  INSTALLATION_STATE_FAILED = 6;
  INSTALLATION_STATE_ADOPTED = 7;
}

message ClusterConfig {
  Engine engine = 1;
  string version = 2;
  ReplicationMode replication_mode = 3;
  int32 replica_count = 4;
  string storage_config_id = 5;
  bool pitr_enabled = 6;
  map<string, string> labels = 7;
  // Phase 2: service location model
  ServiceLocation service_location = 8;
}

message Cluster {
  string id = 1;
  string name = 2;
  ClusterConfig config = 3;
  ClusterStatus status = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
  // Phase 2: service location model
  ServiceLocation service_location = 16;
}

message Node {
  string id = 1;
  string cluster_id = 2;
  string hostname = 3;
  NodeRole role = 4;
  string address = 5;
  int32 port = 6;
  map<string, string> labels = 7;
  string agent_version = 8;
  google.protobuf.Timestamp last_seen = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
  string status = 22;
  // Phase 2: PostgreSQL installation & health visibility
  bool postgres_installed = 12;
  string postgres_version = 13;
  bool postgres_data_initialized = 14;
  // Phase 4: human-readable status detail
  string status_detail = 15;
  // Phase 2: service location model
  ServiceLocation service_location = 16;
  bool docker_available = 17;
  InstallationState installation_state = 18;
  string conflict_details = 19;
  bool agent_connected = 20;
  int64 agent_latency_ms = 21;
  string os = 23;
  string platform = 24;
  string platform_version = 25;
  string kernel_version = 26;
  string architecture = 27;
  int32 cpu_cores = 28;
  double cpu_usage_percent = 29;
  int64 load_average_1m = 30;
  int64 load_average_5m = 31;
  int64 load_average_15m = 32;
  int64 memory_total_bytes = 33;
  int64 memory_used_bytes = 34;
  int64 memory_available_bytes = 35;
  double memory_usage_percent = 36;
  int64 disk_total_bytes = 37;
  int64 disk_used_bytes = 38;
  int64 disk_available_bytes = 39;
  double disk_usage_percent = 40;
  int64 uptime_seconds = 41;
  NodeMetric latest_metric = 42;
}

message NodeMetric {
  string id = 1;
  string node_id = 2;
  google.protobuf.Timestamp recorded_at = 3;
  string os = 4;
  string platform = 5;
  string platform_version = 6;
  string kernel_version = 7;
  string architecture = 8;
  int32 cpu_cores = 9;
  double cpu_usage_percent = 10;
  int64 load_average_1m = 11;
  int64 load_average_5m = 12;
  int64 load_average_15m = 13;
  int64 memory_total_bytes = 14;
  int64 memory_used_bytes = 15;
  int64 memory_available_bytes = 16;
  double memory_usage_percent = 17;
  int64 disk_total_bytes = 18;
  int64 disk_used_bytes = 19;
  int64 disk_available_bytes = 20;
  double disk_usage_percent = 21;
  int64 uptime_seconds = 22;
}

message Pagination {
  int32 page = 1;
  int32 page_size = 2;
  int32 total = 3;
}
