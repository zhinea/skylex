syntax = "proto3";

package skylex.v1;

import "google/protobuf/timestamp.proto";

enum ClusterStatus {
  CLUSTER_STATUS_UNSPECIFIED = 0;
  CLUSTER_STATUS_CREATING = 1;
  CLUSTER_STATUS_HEALTHY = 2;
  CLUSTER_STATUS_DEGRADED = 3;
  CLUSTER_STATUS_FAILED = 4;
  CLUSTER_STATUS_DELETING = 5;
}

enum NodeRole {
  NODE_ROLE_UNSPECIFIED = 0;
  NODE_ROLE_PRIMARY = 1;
  NODE_ROLE_REPLICA = 2;
}

enum ReplicationMode {
  REPLICATION_MODE_UNSPECIFIED = 0;
  REPLICATION_MODE_ASYNC = 1;
  REPLICATION_MODE_SYNC = 2;
}

enum Engine {
  ENGINE_UNSPECIFIED = 0;
  ENGINE_POSTGRESQL = 1;
}

enum ServiceLocation {
  SERVICE_LOCATION_UNSPECIFIED = 0;
  SERVICE_LOCATION_NATIVE = 1;
  SERVICE_LOCATION_DOCKER = 2;
}

enum InstallationState {
  INSTALLATION_STATE_UNSPECIFIED = 0;
  INSTALLATION_STATE_PENDING_PREFLIGHT = 1;
  INSTALLATION_STATE_NOTHING_FOUND = 2;
  INSTALLATION_STATE_CONFLICT = 3;
  INSTALLATION_STATE_INSTALLING = 4;
  INSTALLATION_STATE_INSTALLED = 5;
  INSTALLATION_STATE_FAILED = 6;
  INSTALLATION_STATE_ADOPTED = 7;
}

message ClusterConfig {
  Engine engine = 1;
  string version = 2;
  ReplicationMode replication_mode = 3;
  int32 replica_count = 4;
  string storage_config_id = 5;
  bool pitr_enabled = 6;
  map<string, string> labels = 7;
  // Phase 2: service location model
  ServiceLocation service_location = 8;
}

message Cluster {
  string id = 1;
  string name = 2;
  ClusterConfig config = 3;
  ClusterStatus status = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
  // Phase 2: service location model
  ServiceLocation service_location = 16;
}

message Node {
  string id = 1;
  string cluster_id = 2;
  string hostname = 3;
  NodeRole role = 4;
  string address = 5;
  int32 port = 6;
  map<string, string> labels = 7;
  string agent_version = 8;
  google.protobuf.Timestamp last_seen = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
  // Phase 2: PostgreSQL installation & health visibility
  bool postgres_installed = 12;
  string postgres_version = 13;
  bool postgres_data_initialized = 14;
  // Phase 4: human-readable status detail
  string status_detail = 15;
  // Phase 2: service location model
  ServiceLocation service_location = 16;
  bool docker_available = 17;
  InstallationState installation_state = 18;
  string conflict_details = 19;
}

message Pagination {
  int32 page = 1;
  int32 page_size = 2;
  int32 total = 3;
}
