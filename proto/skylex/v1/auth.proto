syntax = "proto3";

package skylex.v1;

import "google/protobuf/timestamp.proto";
import "skylex/v1/common.proto";

enum Role {
  ROLE_UNSPECIFIED = 0;
  ROLE_ADMIN = 1;
  ROLE_OPERATOR = 2;
  ROLE_VIEWER = 3;
}

message User {
  string id = 1;
  string email = 2;
  string display_name = 3;
  Role role = 4;
  google.protobuf.Timestamp created_at = 5;
}

message APIKey {
  string id = 1;
  string name = 2;
  google.protobuf.Timestamp expires_at = 3;
  google.protobuf.Timestamp created_at = 4;
}

message AgentToken {
  string id = 1;
  string name = 2;
  Role role = 3;
  google.protobuf.Timestamp expires_at = 4;
  google.protobuf.Timestamp created_at = 5;
}

service AuthService {
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);
  rpc CreateAPIKey(CreateAPIKeyRequest) returns (CreateAPIKeyResponse);
  rpc ListAPIKeys(ListAPIKeysRequest) returns (ListAPIKeysResponse);
  rpc DeleteAPIKey(DeleteAPIKeyRequest) returns (DeleteAPIKeyResponse);
  rpc CreateAgentToken(CreateAgentTokenRequest) returns (CreateAgentTokenResponse);
  rpc ListAgentTokens(ListAgentTokensRequest) returns (ListAgentTokensResponse);
  rpc DeleteAgentToken(DeleteAgentTokenRequest) returns (DeleteAgentTokenResponse);
  rpc GetAgentInstallCommand(GetAgentInstallCommandRequest) returns (GetAgentInstallCommandResponse);
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string access_token = 1;
  string refresh_token = 2;
  User user = 3;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message RefreshTokenResponse {
  string access_token = 1;
  string refresh_token = 2;
}

message ListUsersRequest {
  int32 page = 1;
  int32 page_size = 2;
}

message ListUsersResponse {
  repeated User users = 1;
  Pagination pagination = 2;
}

message CreateUserRequest {
  string email = 1;
  string password = 2;
  string display_name = 3;
  Role role = 4;
}

message CreateUserResponse {
  User user = 1;
}

message DeleteUserRequest {
  string id = 1;
}

message DeleteUserResponse {}

message CreateAPIKeyRequest {
  string name = 1;
  google.protobuf.Timestamp expires_at = 2;
}

message CreateAPIKeyResponse {
  APIKey api_key = 1;
  string key = 2;
}

message ListAPIKeysRequest {}

message ListAPIKeysResponse {
  repeated APIKey api_keys = 1;
}

message DeleteAPIKeyRequest {
  string id = 1;
}

message DeleteAPIKeyResponse {}

message CreateAgentTokenRequest {
  string name = 1;
  Role role = 2;
  google.protobuf.Timestamp expires_at = 3;
}

message CreateAgentTokenResponse {
  AgentToken agent_token = 1;
  string token = 2;
}

message ListAgentTokensRequest {}

message ListAgentTokensResponse {
  repeated AgentToken tokens = 1;
}

message DeleteAgentTokenRequest {
  string id = 1;
}

message DeleteAgentTokenResponse {}

message GetAgentInstallCommandRequest {}

message GetAgentInstallCommandResponse {
  string script_url = 1;
  string server_addr = 2;
  string token = 3;
}
